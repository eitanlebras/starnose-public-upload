[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "starnose"
version = "0.1.4"
description = "See what Claude Code is doing with your tokens"
readme = "README.md"
requires-python = ">=3.7"
license = {text = "MIT"}
keywords = ["claude", "claude-code", "anthropic", "llm", "debugging"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
]

[project.urls]
Homepage = "https://starnose.dev"
Repository = "https://github.com/eitanlebras/starnose"

[project.scripts]
starnose = "starnose.cli:main"
snose = "starnose.cli:main"
